services:
  postgres:
    image: postgres:17-alpine
    container_name: mercadoagro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mercadoagro
      POSTGRES_USER: mercadoagro
      POSTGRES_PASSWORD: mercadoagro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mercadoagro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
